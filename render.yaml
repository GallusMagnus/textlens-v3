services:
  - type: web
    name: textlens
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: TEXTLENS_MODEL
        value: gpt-5.5
      - key: VITE_WORKSPACE_PASSCODE
        sync: false
